<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darbo Žurnalas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E8E5DF;
    --border-strong: #D0CCC3; --text: #1A1916; --text-muted: #8A877E;
    --text-faint: #B5B2AA; --accent: #2D5BE3; --accent-light: #EEF2FD;
    --green: #1A7A4A; --green-light: #E8F5EE;
    --orange: #C4590A; --orange-light: #FEF0E6;
    --gray: #6B6862; --gray-light: #F2F1EE;
    --radius: 10px; --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 18px 32px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { width: 36px; height: 36px; background: var(--text); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .live-label { font-size: 12px; color: var(--green); font-weight: 500; }
  .week-nav { display: flex; align-items: center; gap: 10px; }
  .week-btn { width: 34px; height: 34px; border: 1px solid var(--border-strong); background: var(--surface); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.15s; }
  .week-btn:hover { background: var(--bg); color: var(--text); }
  .week-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .week-label { font-size: 14px; font-weight: 500; min-width: 160px; text-align: center; }

  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .stat-inline { display: flex; align-items: center; gap: 8px; }
  .stat-inline-val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }
  .stat-inline-label { font-size: 13px; color: var(--text-muted); }
  .sep { width: 1px; height: 28px; background: var(--border); }

  .main { padding: 28px 32px; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .day-card.today { border-color: var(--accent); }
  .day-head { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background 0.15s; }
  .day-head:hover { background: var(--bg); }
  .day-head-left { display: flex; align-items: center; gap: 10px; }
  .day-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .today-pill { font-size: 10px; font-weight: 600; background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-date-str { font-size: 13px; color: var(--text-muted); }
  .day-head-right { display: flex; align-items: center; gap: 10px; }
  .day-count-badge { font-size: 12px; background: var(--gray-light); color: var(--gray); padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .day-sum { font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
  .chevron { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; flex-shrink: 0; }
  .collapsed .chevron { transform: rotate(-90deg); }

  .tasks-body { border-top: 1px solid var(--border); }
  .tasks-body.hidden { display: none; }
  .task-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .task-note { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; line-height: 1.4; }
  .task-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .tag-ig { background: #EDE8FD; color: #4A3AAA; }
  .tag-ugc { background: #E6F5EE; color: #1A5C38; }
  .tag-meta { background: #E8F0FD; color: #1A4098; }
  .tag-design { background: #FEF3E7; color: #9C4A10; }
  .tag-extra { background: #FDE8ED; color: #9C1A36; }
  .tag-other { background: var(--gray-light); color: var(--gray); }
  .task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .task-price { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .status-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .status-done { background: var(--green-light); color: var(--green); }
  .status-progress { background: var(--orange-light); color: var(--orange); }
  .status-wait { background: var(--gray-light); color: var(--gray); }
  .empty-day { padding: 20px; text-align: center; color: var(--text-faint); font-size: 13px; }

  /* Error / not found state */
  .error-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; text-align: center; gap: 12px; color: var(--text-muted);
  }
  .error-state svg { width: 44px; height: 44px; stroke: var(--text-faint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .error-state strong { font-size: 16px; color: var(--text); }
  .error-state span { font-size: 14px; }

  .new-task-flash { animation: flash 1s ease; }
  @keyframes flash { 0%{background:#EEF2FD} 100%{background:transparent} }

  .footer { text-align: center; padding: 32px; color: var(--text-faint); font-size: 12px; }

  @media (max-width: 700px) {
    .header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .top-bar { padding: 12px 16px; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    </div>
    <div>
      <div style="font-size:16px;font-weight:600;letter-spacing:-0.3px">Darbo žurnalas</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:1px" id="clientNameSub">Kraunama...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="live-dot"></div>
      <span class="live-label">Realiu laiku</span>
    </div>
    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="week-label" id="weekLabel"></span>
      <button class="week-btn" onclick="changeWeek(1)">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="top-bar">
  <div class="stat-inline">
    <span class="stat-inline-val" id="statTasks">—</span>
    <span class="stat-inline-label">užduotys</span>
  </div>
  <div class="sep"></div>
  <div class="stat-inline">
    <span class="stat-inline-val" id="statSum">—</span>
    <span class="stat-inline-label">suma</span>
  </div>
  <div class="sep"></div>
  <div class="stat-inline">
    <span class="stat-inline-val" id="statDone">—</span>
    <span class="stat-inline-label">atlikta</span>
  </div>
</div>

<main class="main" id="daysList"></main>

<div class="footer">Paskutinis atnaujinimas: <span id="lastUpdate">—</span></div>

<script>
const SUPABASE_URL = 'https://oslhylezbyvgesnybtlj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zbGh5bGV6Ynl2Z2VzbnlidGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjcwODcsImV4cCI6MjA5NDAwMzA4N30.GDrd9EFP_2gnSw_nO-W87fsKgcr4d-BjqTa9fqmoavo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAYS = ['Pirmadienis','Antradienis','Trečiadienis','Ketvirtadienis','Penktadienis','Šeštadienis','Sekmadienis'];
const CAT_NAME = {ig:'Instagram + Facebook',ugc:'UGC',meta:'Meta Ads',design:'Dizainas',extra:'Papildomi darbai',other:'Kita'};
const CAT_CLASS = {ig:'tag-ig',ugc:'tag-ugc',meta:'tag-meta',design:'tag-design',extra:'tag-extra',other:'tag-other'};
const STATUS_LABELS = {done:'✅ Atlikta',progress:'🔄 Vykdoma',wait:'⏳ Laukia'};
const STATUS_CLASS = {done:'status-done',progress:'status-progress',wait:'status-wait'};

let weekOffset = 0;
let tasks = [];
let collapsed = {};
let currentClient = null;

// Get client slug from URL: index.html?c=slug
const clientSlug = new URLSearchParams(window.location.search).get('c');

function getMonday(offset) {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1 + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}
function fmt(d) { return d.toISOString().split('T')[0]; }
function fmtNice(d) { return new Date(d + 'T12:00:00').toLocaleDateString('lt-LT', { month: 'short', day: 'numeric' }); }
function getWeekDays() {
  const mon = getMonday(weekOffset);
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(d.getDate()+i); return d; });
}

function updateWeekLabel() {
  const days = getWeekDays();
  document.getElementById('weekLabel').textContent = fmtNice(fmt(days[0])) + ' – ' + fmtNice(fmt(days[6]));
}

function changeWeek(dir) { weekOffset += dir; loadTasks(); }

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(title, sub) {
  document.getElementById('daysList').innerHTML = `
    <div class="error-state">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <strong>${title}</strong>
      <span>${sub}</span>
    </div>`;
}

async function init() {
  updateWeekLabel();

  if (!clientSlug) {
    document.getElementById('clientNameSub').textContent = 'Neteisinga nuoroda';
    showError('Neteisinga nuoroda', 'Patikrink nuorodą ir bandyk dar kartą.');
    return;
  }

  // Load client by slug
  const { data: client, error } = await sb.from('clients').select('*').eq('slug', clientSlug).single();
  if (error || !client) {
    document.getElementById('clientNameSub').textContent = 'Klientas nerastas';
    showError('Klientas nerastas', 'Ši nuoroda nebegalioja arba yra neteisinga.');
    return;
  }

  currentClient = client;
  document.title = `${client.name} — Darbo žurnalas`;
  document.getElementById('clientNameSub').textContent = client.name;

  loadTasks();

  // Realtime updates
  sb.channel('tasks-client-' + client.id)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: `client_id=eq.${client.id}` }, () => loadTasks())
    .subscribe();
}

async function loadTasks() {
  if (!currentClient) return;
  updateWeekLabel();
  const days = getWeekDays().map(fmt);
  const { data, error } = await sb.from('tasks')
    .select('*')
    .eq('client_id', currentClient.id)
    .gte('day', days[0])
    .lte('day', days[6])
    .order('created_at');
  if (error) return;
  tasks = data || [];
  renderDays();
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('lt-LT');
}

function updateStats() {
  document.getElementById('statTasks').textContent = tasks.length || '—';
  document.getElementById('statSum').textContent = tasks.length ? tasks.reduce((a,t) => a+t.total, 0).toFixed(0) + ' €' : '—';
  const done = tasks.filter(t => t.status === 'done').length;
  document.getElementById('statDone').textContent = tasks.length ? `${done}/${tasks.length}` : '—';
}

function renderDays() {
  const days = getWeekDays();
  const todayStr = fmt(new Date());
  const container = document.getElementById('daysList');
  container.innerHTML = '';
  days.forEach((d, i) => {
    const key = fmt(d);
    const dt = tasks.filter(t => t.day === key);
    if (dt.length === 0 && key !== todayStr) return;
    const sum = dt.reduce((a,t) => a+t.total, 0);
    const isCol = collapsed[key];
    const isToday = key === todayStr;
    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '');
    card.innerHTML = `
      <div class="day-head ${isCol ? 'collapsed' : ''}" onclick="toggleDay('${key}')">
        <div class="day-head-left">
          <span class="day-name">${DAYS[i]}</span>
          ${isToday ? '<span class="today-pill">šiandien</span>' : ''}
          <span class="day-date-str">${fmtNice(key)}</span>
        </div>
        <div class="day-head-right">
          <span class="day-count-badge">${dt.length} užd.</span>
          ${sum > 0 ? `<span class="day-sum">${sum.toFixed(0)} €</span>` : ''}
          <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="tasks-body${isCol ? ' hidden' : ''}">
        ${dt.length === 0
          ? `<div class="empty-day">Dar nieko šiai dienai</div>`
          : dt.map(t => `
            <div class="task-row" id="task-${t.id}">
              <div class="task-info">
                <div class="task-name">${escHtml(t.name)}</div>
                ${t.note ? `<div class="task-note">${escHtml(t.note)}</div>` : ''}
                <div class="task-tags">
                  <span class="tag ${CAT_CLASS[t.cat] || 'tag-other'}">${CAT_NAME[t.cat] || t.cat}</span>
                  ${t.qty !== 1 ? `<span class="tag tag-other">${t.qty} vnt.</span>` : ''}
                </div>
              </div>
              <div class="task-right">
                ${t.price > 0 ? `<span class="task-price">${t.total.toFixed(0)} €</span>` : ''}
                <span class="status-tag ${STATUS_CLASS[t.status] || 'status-done'}">${STATUS_LABELS[t.status] || '✅ Atlikta'}</span>
              </div>
            </div>
          `).join('')}
      </div>`;
    container.appendChild(card);
  });
  updateStats();
}

function toggleDay(key) { collapsed[key] = !collapsed[key]; renderDays(); }

init();
</script>
</body>
</html>
